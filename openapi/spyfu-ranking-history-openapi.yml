          type: integer
          format: int32
          readOnly: true
          example: 100
        results:
          type: array
          items:
            type: object
            properties:
              domain:
                type: string
                nullable: true
              keyword:
                type: string
                nullable: true
              results:
                type: object
                additionalProperties:
                  type: integer
                  format: int32
                nullable: true
            additionalProperties: false
          nullable: true
      additionalProperties: false
    PublicApiDomainOnKeywordOutputDto:
      type: object
      properties:
        domain:
          type: string
