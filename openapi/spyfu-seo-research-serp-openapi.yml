  /v2/seo/getSeoKeywords:
    get:
      operationId: OrganicSerpApi_GetSeoKeywords_GET
      summary: Get SEO Keywords
      description: Unified endpoint for SEO keyword analyses. Select an analysis via
        `searchType` to return gains/losses in clicks, rank movers, page-one entries/exits,
        newly ranked terms, or top-value keywords -- without switching endpoints.
      parameters:
      - name: query
        in: query
        description: Domain, URL, subdomain, or path to analyze. Accepts full domains
          (example.com), complete URLs (https://example.com/blog), subdomains (blog.example.com),
          specific paths (example.com/products/), or individual pages.
        required: true
        schema:
          type: string
          example: example.com
        example: example.com
      - name: searchType
        in: query
        description: Type of SEO keyword analysis to perform. Each type provides different
          insights into keyword performance and ranking changes.
        required: true
        schema:
          type: string
          default: MostValuable
          enum:
          - GainedClicks
          - GainedRanks
          - JustFellOff
          - JustMadeIt
          - LostClicks
          - LostRanks
          - MostValuable
          - NewlyRanked
          x-enumDescriptions:
            GainedClicks: MoM increase in estimated organic clicks.
            GainedRanks: Largest positive MoM rank change (moved up).
            JustFellOff: Now <10; was 1-10 last month (fell off page one).
            JustMadeIt: Now 1-10; was <10 last month (made page one).
            LostClicks: MoM decrease in estimated organic clicks.
            LostRanks: Largest negative MoM rank change (moved down).
            MostValuable: Highest current estimated organic clicks for the domain/URL.
            NewlyRanked: Unranked last month; now 1-100.
          example: MostValuable
        example: MostValuable
      - name: compareDomain
        in: query
        description: Domain to compare against when evaluating where it outranks you
          and where you outrank it.
        schema:
          type: string
          example: competitor.com
        example: competitor.com
      - name: includeTerms
        in: query
        description: Comma-separated list of terms that must be present in the keyword.
        schema:
          type: string
          example: hosting,domain,website
      - name: includeAnyTerm
        in: query
        description: 'Used with includeTerms. If true: match any term (OR). If false:
          require all terms (AND).'
        schema:
          type: boolean
          default: false
          example: false
      - name: excludeTerms
        in: query
        description: Comma-separated list of terms to exclude from results (e.g.,
