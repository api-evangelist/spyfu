components:
  schemas:
    PublicApiLiveSeoStatsWrapperOutputDto:
      type: object
      properties:
        resultCount:
          description: Number of results returned
          type: integer
          format: int32
          readOnly: true
          example: 1
        domain:
          description: Root domain for the results
          type: string
          readOnly: true
          nullable: true
          example: example.com
        url:
          description: URL for the results
          type: string
          readOnly: true
          nullable: true
          example: https://example.com/blog
        totalOrganicResults:
          description: Total keywords found for domain or URL
          type: integer
          format: int64
          readOnly: true
          example: 15420
        monthlyOrganicClicks:
          description: We estimate that the domain or URL should get this many total
            clicks to its page (per month).
          type: number
          format: double
          readOnly: true
          example: 125000.5
        monthlyOrganicClickValue:
          description: The estimated value over a month for ranking on the domain
            or URL.
          type: number
          format: double
          readOnly: true
          example: 45000.75
        totalSearchVolume:
          description: Sum of monthly search volume across all returned keywords.
          type: number
          format: double
          example: 700000
      additionalProperties: false
    PublicApiOrganicSerpKeywordOutputDto:
      description: Represents an organic search keyword with comprehensive SEO metrics
        including rankings, click estimates, costs, and SERP analysis data.
      type: object
      properties:
        keyword:
          description: The keyword for which this domain ranks organically in the
            top 100 search results.
          type: string
          readOnly: true
          nullable: true
          example: running shoes
        topRankedUrl:
          description: The highest ranking URL from this domain for this specific
            keyword.
          type: string
          readOnly: true
          nullable: true
          example: https://example.com/best-running-shoes
        rank:
          description: Current organic search position for this keyword (1 = top position).
          type: integer
          format: int32
          readOnly: true
          example: 7
        rankChange:
          description: Change in ranking position since the previous measurement period
            (positive values indicate ranking improvement; negative values indicate
            moving further down the SERP).
          type: integer
          format: int32
          readOnly: true
          nullable: true
          example: -3
        searchVolume:
          description: Monthly search volume for this keyword based on Google search
            data across the selected country/region.
          type: integer
          format: int64
          readOnly: true
          nullable: true
          example: 700000
        keywordDifficulty:
          description: SEO difficulty score (1-100) indicating how challenging it
            would be to rank organically for this keyword, with 100 being most difficult.
          type: integer
          format: int32
          readOnly: true
          example: 69
        broadCostPerClick:
          description: Average cost per click for broad match advertising on this
            keyword.
          type: number
          format: double
          readOnly: true
          nullable: true
          example: 0.28
        phraseCostPerClick:
          description: Average cost per click for phrase match advertising on this
            keyword.
          type: number
          format: double
          readOnly: true
          nullable: true
          example: 0.28
        exactCostPerClick:
          description: Average cost per click for exact match advertising on this
            keyword. These costs fluctuate depending on many factors, so keep that
            in mind when you are estimating larger budgets.
          type: number
          format: double
          readOnly: true
          nullable: true
          example: 0.28
        seoClicks:
          description: Estimated monthly organic clicks this domain receives from
            this keyword based on current ranking position.
          type: integer
          format: int64
          readOnly: true
          example: 3000
        seoClicksChange:
          description: Change in estimated organic clicks compared to the previous
            measurement period.
          type: integer
          format: int64
          readOnly: true
          nullable: true
          example: -600
        totalMonthlyClicks:
          description: Total number of clicks (organic and paid combined) on search
            results for this keyword in the past month.
          type: integer
          format: int64
          readOnly: true
          nullable: true
          example: 647000
        percentMobileSearches:
          description: Percentage of searches for this keyword that come from mobile
            devices.
          type: number
          format: double
          readOnly: true
          nullable: true
          example: 0.4
        percentDesktopSearches:
          description: Percentage of searches for this keyword that come from desktop
            devices.
          type: number
          format: double
          readOnly: true
          nullable: true
          example: 0.6
        percentNotClicked:
          description: Percentage of searches where users leave the SERP without clicking
            any result.
          type: number
          format: double
          readOnly: true
          nullable: true
          example: 0.075
        percentPaidClicks:
          description: Percentage of total SERP clicks that go to paid ads.
          type: number
          format: double
          readOnly: true
          nullable: true
          example: 0.079
        percentOrganicClicks:
          description: Percentage of total SERP clicks that go to organic search results.
          type: number
          format: double
          readOnly: true
          nullable: true
          example: 0.921
        broadMonthlyCost:
          description: 'Estimated monthly advertising cost for broad match bidding
            on this keyword from the #2 position.'
          type: number
          format: double
          readOnly: true
          nullable: true
          example: 6043.5
        phraseMonthlyCost:
          description: 'Estimated monthly advertising cost for phrase match bidding
            on this keyword from the #2 position.'
          type: number
          format: double
          readOnly: true
          nullable: true
          example: 5695.5
        exactMonthlyCost:
          description: 'Estimated monthly advertising cost for exact match bidding
