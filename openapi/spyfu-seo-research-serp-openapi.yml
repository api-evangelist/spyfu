  /v2/seo/getOrganicOutrankingKeywords:
    get:
      operationId: OrganicSerpApi_GetOrganicOutrankingKeywords_GET
      summary: Get Organic Outranking Keywords
      description: Compare two domains' organic rankings in one call. Returns keywords
        where one domain outranks the other or has just overtaken it, with both sites'
        ranks, changes, clicks, and URLs. The comparison domain's metrics appear in
        the your* fields. Choose the mode with keywordSearchType.
      parameters:
      - name: query
        in: query
        description: Primary domain to analyze. This domain's ranking data appears
          in the main response fields (rank, rankChange, seoClicks, etc.). Accepts
          full domains (example.com), complete URLs, subdomains, or specific paths.
        required: true
        schema:
          type: string
          example: competitor.com
        example: competitor.com
      - name: searchType
        in: query
        description: 'Required. Chooses the ranking scenario for the query/compareDomain
          pair and governs how results are interpreted. TheyOutrankYou: keywords where
          query ranks above compareDomain. TheyJustSurpassedYou: recent crossovers
          where query moved ahead.'
        required: true
        schema:
          type: string
          default: TheyOutrankYou
          enum:
          - TheyOutrankYou
          - TheyJustSurpassedYou
          x-enum-descriptions:
            TheyOutrankYou: Keywords where the query domain ranks higher than compareDomain
              now. To see where a competitor outranks you, put competitor in query
              and your site in compareDomain.
            TheyJustSurpassedYou: Keywords where the query domain recently overtook
              compareDomain in rank. Highlights fresh shifts. To see where a competitor
              just passed you, put competitor in query and your site in compareDomain.
          example: TheyOutrankYou
        example: TheyOutrankYou
      - name: compareDomain
        in: query
        description: Domain to compare against. This domain's ranking data appears
          in the 'your' response fields (yourRank, yourRankChange, yourUrl). The endpoint
          shows where the query domain currently outranks this comparison domain.
        required: true
        schema:
          type: string
          example: yourdomain.com
        example: yourdomain.com
      - name: includeTerms
        in: query
        description: Comma-separated list of terms that must be present in the keyword.
        schema:
          type: string
          example: hosting,domain,website
      - name: includeAnyTerm
        in: query
        description: 'Used with includeTerms. If true: match any term (OR). If false:
          require all terms (AND).'
        schema:
          type: boolean
          default: false
          example: false
      - name: excludeTerms
        in: query
        description: Comma-separated list of terms to exclude from results (e.g.,
          branded or irrelevant terms).
        schema:
          type: string
          example: free,cheap,discount
      - name: excludeHomepageKeywords
        in: query
        description: If true, exclude keywords where the query domain's homepage (root
