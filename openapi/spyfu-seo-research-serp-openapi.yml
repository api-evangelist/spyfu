  /v2/seo/getTopPages:
    get:
      operationId: TopPagesApi_GetTopPages_GET
      summary: Get Top Performing Pages
      description: 'Returns top organic pages for a domain, subdomain, path, or full
        URL. Use searchType to choose: MostTraffic (highest estimated SEO clicks)
        or New (newly gaining traffic). Results include page URL and monthly SEO clicks;
        optional keywordFilter narrows by ranked keywords.'
      parameters:
      - name: query
        in: query
        description: Domain or URL to analyze. Accepts full domains (example.com),
          complete URLs (https://example.com/blog), subdomains (blog.example.com),
          or specific paths (example.com/products/).
        required: true
        schema:
          type: string
          example: example.com
        example: example.com
      - name: searchType
        in: query
        description: 'Required. Selects page analysis type: MostTraffic=pages generating
          most organic traffic overall, New=pages recently discovered with significant
          traffic. Determines whether to return established top performers or emerging
          high-traffic pages.'
        required: true
        schema:
          type: string
          default: MostTraffic
          enum:
          - MostTraffic
          - New
          x-enum-descriptions:
            MostTraffic: Returns pages with highest organic traffic for the query
              domain/path. Identifies top-performing content by estimated monthly
              organic clicks. Shows which pages drive most SEO value and traffic to
              the site.
            New: Returns pages recently discovered generating significant organic
              traffic for the query domain/path. Identifies newly successful content
              and emerging pages. Reveals fresh opportunities and content strategies
              driving recent SEO growth.
          example: MostTraffic
        example: MostTraffic
      - name: keywordFilter
        in: query
        description: Filter to pages that rank for keywords containing this term.
          Helps narrow results to specific topics or content themes.
        schema:
          type: string
          example: hosting
        example: hosting
      - name: seoClicks.min
        in: query
        description: Filter to pages where estimated monthly organic clicks are ≥
          this value.
        schema:
          type: number
          format: float
          example: '100'
        example: '100'
      - name: seoClicks.max
        in: query
        description: Filter to pages where estimated monthly organic clicks are ≤
          this value.
        schema:
          type: number
          format: float
          example: 10000
        example: 10000
      - name: pageSize
        in: query
        description: The maximum number of rows returned.
        schema:
          type: integer
          format: int32
          default: 5
          maximum: 1000
          minimum: 1
          example: 5
        example: 5
      - name: countryCode
        in: query
        description: Country market to search. Specifically, this maps to the Google
          domain version to query against (e.g., google.com for US, google.de for
          Germany, etc.).  <a href='https://developer.spyfu.com/reference/adhistoryapi_getdomainadhistory_get#/'>All
          Countries</a>
        schema:
          type: string
          default: US
          enum:
          - AR
          - AT
          - AU
          - BE
          - BR
          - CA
          - CH
          - DE
          - DK
          - ES
          - FR
          - IE
          - IN
          - IT
          - JP
          - MX
          - NL
          - 'NO'
          - NZ
          - PL
          - PT
          - SE
          - SG
          - TR
          - UA
          - UK
          - US
          - ZA
          example: US
        example: US
      - name: sortBy
        in: query
        description: Column to sort by.
        schema:
          type: string
          default: SeoClicks
          const: SeoClicks
          x-enumDescriptions:
            SeoClicks: Estimated monthly organic clicks that each new page receives
              from all of its keyword rankings
          example: SeoClicks
        example: SeoClicks
      - name: sortOrder
        in: query
        description: Order to sort the results.
        schema:
          type: string
          default: Descending
          enum:
          - Ascending
          - Descending
          example: Descending
        example: Descending
      - name: startingRow
        in: query
        description: Row number to start the results with.
        schema:
          type: integer
          format: int32
          default: 1
          maximum: 10000
          minimum: 1
          example: 1
        example: 1
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                description: Response wrapper containing top pages results with comprehensive
                  SEO performance metrics and traffic analysis.
                type: object
                properties:
                  resultCount:
                    description: Number of results returned
                    type: integer
                    format: int32
                    readOnly: true
                    example: 100
                  results:
                    description: Array of top-performing pages with organic traffic
                      estimates, keyword rankings, and competitive performance data.
                    type: array
                    items:
                      type: object
                      properties:
                        title:
                          description: The HTML title tag of the page as it appears
                            in search results. This helps identify the page's content
                            focus and SEO optimization strategy.
                          type: string
                          nullable: true
                          example: Best Running Shoes 2024 - Complete Buyer's Guide
                        url:
                          description: The complete URL of the page that ranks for
                            multiple organic keywords. This shows the specific page
                            driving organic traffic for the domain.
                          type: string
                          nullable: true
                          example: https://example.com/best-running-shoes-2024
                        keywordCount:
                          description: Total number of unique keywords this page ranks
                            for in the top 100 organic search results. Higher counts
                            indicate broader topical coverage.
                          type: integer
                          format: int64
                          example: 247
                        estMonthlySeoClicks:
                          description: Estimated total monthly organic clicks this
                            page receives from all keywords it ranks for. This represents
                            the page's overall organic traffic value.
                          type: integer
                          format: int64
                          example: 15420
                        topKeyword:
                          description: The highest-value keyword this page ranks for,
                            typically the term driving the most organic traffic to
                            this specific page.
                          type: string
                          nullable: true
                          example: best running shoes
                        topKeywordPosition:
                          description: 'The organic search position (rank) for the
                            top keyword, where 1 represents the #1 organic result
                            on Google.'
                          type: integer
                          format: int32
                          example: 3
                        topKeywordSearchVolume:
                          description: Monthly search volume for the top keyword,
                            showing how many people search for this term each month
                            on Google.
                          type: integer
                          format: int64
                          nullable: true
                          example: 74000
                        topKeywordClicks:
                          description: Estimated monthly organic clicks this page
                            receives specifically from its top keyword, based on the
                            keyword's search volume and the page's ranking position.
                          type: integer
                          format: int64
                          example: 8950
                      additionalProperties: false
                      description: Represents a top-performing page from a domain's
