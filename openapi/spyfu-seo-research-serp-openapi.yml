                          type: number
                          format: double
                          readOnly: true
                          nullable: true
                          example: 0.079
                        percentOrganicClicks:
                          description: Percentage of total SERP clicks that go to
                            organic search results.
                          type: number
                          format: double
                          readOnly: true
                          nullable: true
                          example: 0.921
                        broadMonthlyCost:
                          description: 'Estimated monthly advertising cost for broad
                            match bidding on this keyword from the #2 position.'
                          type: number
                          format: double
                          readOnly: true
                          nullable: true
                          example: 6043.5
                        phraseMonthlyCost:
                          description: 'Estimated monthly advertising cost for phrase
                            match bidding on this keyword from the #2 position.'
                          type: number
                          format: double
                          readOnly: true
                          nullable: true
                          example: 5695.5
                        exactMonthlyCost:
                          description: 'Estimated monthly advertising cost for exact
                            match bidding on this keyword from the #2 position.'
                          type: number
                          format: double
                          readOnly: true
                          nullable: true
                          example: 5392.5
                        paidCompetitors:
                          description: Total number of advertisers observed purchasing
