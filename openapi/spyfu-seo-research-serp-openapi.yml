          type: number
          format: double
          readOnly: true
          nullable: true
          example: 5392.5
        paidCompetitors:
          description: Total number of advertisers observed purchasing ads for this
            keyword over the last 14 months.
          type: integer
          format: int32
          readOnly: true
          nullable: true
          example: 0
        rankingHomepages:
          description: Number of domain homepages (vs. deeper pages) ranking in the
            top 100 organic results for this keyword.
          type: integer
          format: int32
          readOnly: true
          nullable: true
          example: 10
        yourRank:
          description: The comparison domain's organic search position for this keyword
