                          type: integer
                          format: int64
                          readOnly: true
                          example: 3000
                        seoClicksChange:
                          description: Change in estimated organic clicks compared
                            to the previous measurement period.
                          type: integer
                          format: int64
                          readOnly: true
                          nullable: true
                          example: -600
                        totalMonthlyClicks:
                          description: Total number of clicks (organic and paid combined)
