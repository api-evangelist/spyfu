        schema:
          type: string
          default: SearchVolume
          enum:
          - SearchVolume
          - KeywordDifficulty
          - Rank
          - RankChange
          - SeoClicks
          - SeoClicksChange
          - PercentMobileSearches
          - PercentDesktopSearches
          - PercentNotClicked
          - PercentPaidClicks
          - PercentOrganicClicks
          - BroadCostPerClick
          - ExactCostPerClick
          - PhraseCostPerClick
          - BroadMonthlyCost
          - ExactMonthlyCost
          - PhraseMonthlyCost
          - TotalMonthlyClicks
          - PaidCompetitors
          - RankingHomepages
          x-enumDescriptions:
            SearchVolume: Number of searches done this past month on Google (or within
              selected country). Blended from multiple sources for better snapshot
              of search activity
            KeywordDifficulty: SEO ranking difficulty score (0-100 scale, higher =
              more difficult to rank). Based on domain strength, on-page signals like
              'keyword in title,' and number of .gov/.edu domains
            Rank: Organic search result position (1 = top organic result)
            RankChange: Change in organic position from previous data update (positive
              values indicate ranking improvement; negative values indicate moving
              further down the SERP).
            SeoClicks: Estimated number of organic clicks the domain gets from ranking
              on this keyword
            SeoClicksChange: Change in estimated organic clicks from previous data
              update
            PercentMobileSearches: Percentage breakdown of searches from mobile vs
              desktop devices
            PercentDesktopSearches: Percentage breakdown of searches from desktop
              vs mobile devices
            PercentNotClicked: Rate that searchers leave the SERP without clicking
              any result
            PercentPaidClicks: Percentage of SERP clicks that went to paid ads
            PercentOrganicClicks: Percentage of SERP clicks that went to organic results
            BroadCostPerClick: Average amount advertisers pay per click for broad
              match ads on this keyword
            ExactCostPerClick: Average amount advertisers pay per click for exact
              match ads on this keyword
            PhraseCostPerClick: Average amount advertisers pay per click for phrase
              match ads on this keyword
            BroadMonthlyCost: Estimated monthly advertising spend for broad match
              bidding
            ExactMonthlyCost: Estimated monthly advertising spend for exact match
              bidding
            PhraseMonthlyCost: Estimated monthly advertising spend for phrase match
              bidding
            TotalMonthlyClicks: Total estimated clicks made on this SERP to any paid
              or organic results
            PaidCompetitors: Total number of advertisers seen over the last 6 months
              for this keyword
            RankingHomepages: Number of homepage URLs (vs deeper paths) ranking within
              first 100 results
          example: SearchVolume
        example: SearchVolume
      - name: sortOrder
        in: query
        description: Order to sort the results.
        schema:
          type: string
          default: Descending
          enum:
          - Ascending
          - Descending
          example: Descending
        example: Descending
      - name: startingRow
        in: query
        description: Row number to start the results with.
        schema:
          type: integer
          format: int32
          default: 1
          maximum: 10000
          minimum: 1
          example: 1
        example: 1
      - name: adultFilter
        in: query
