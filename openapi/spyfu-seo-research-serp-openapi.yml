        schema:
          type: boolean
          default: true
          example: true
        example: true
      - name: onlyAdultKeywords
        in: query
        description: Only include adult keywords considered unsafe for work.
        schema:
          type: boolean
          default: false
          example: false
        example: false
      - name: exactMatch
        in: query
        description: "Indicates whether to apply exact match filtering for the query.\r\
          \nThis parameter will result in **only** exact matches,\r\nmeaning protocols\
          \ (http/https) and trailing slashes **must** be included.\r\nFor example,\
          \ a query of \"https://example.com/blog\" will not match\r\n- \"example.com/blog\"\
          \r\n- \"https://example.com/blog/\""
        schema:
          type: boolean
