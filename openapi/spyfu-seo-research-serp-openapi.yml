  /v2/seo/getWhereTheyJustSurpassedYou:
    get:
      operationId: OrganicSerpApi_GetKeywordsWhereTheyJustSurpassedYou_GET
      summary: Get Where They Just Surpassed You Keywords
      description: 'Returns keywords where the query domain recently surpassed the
        comparison domain in organic search rankings. This endpoint identifies competitive
        shifts where one domain has overtaken another, either through ranking improvements,
        competitor declines, or both.


        The response includes both domains'' ranking data, with the comparison domain''s
        metrics appearing in the ''your'' fields (yourRank, yourRankChange, yourUrl).
        Use this to monitor competitive threats or analyze successful competitor strategies.


        **Common Usage Patterns:**

        - Put competitor in `query` and your domain in `compareDomain` to see where
        they''re overtaking you

        - Put your domain in `query` and competitor in `compareDomain` to see where
        you''re gaining ground


        [Visualize this API live on SpyFu](https://www.spyfu.com/seo/keywords/domain?query=example.com)'
      parameters:
      - name: query
        in: query
        description: Primary domain to analyze. This domain's ranking data appears
          in the main response fields (rank, rankChange, seoClicks, etc.). Accepts
          full domains (example.com), complete URLs, subdomains, or specific paths.
        required: true
        schema:
          type: string
          example: competitor.com
        example: competitor.com
      - name: compareDomain
        in: query
        description: Domain to compare against. This domain's ranking data appears
          in the 'your' response fields (yourRank, yourRankChange, yourUrl). The endpoint
          shows where the query domain just surpassed this comparison domain.
        required: true
