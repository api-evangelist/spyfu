openapi: 3.0.3
info:
  title: Competitors API
  version: v2
  description: 'Discover and analyze your most significant competitors across both
    paid and organic search channels to uncover market opportunities and strategic
    insights. Powered by SpyFu''s comprehensive competitive intelligence database
    spanning 18 years of cross-channel data collection across global markets.


    SpyFu''s Competitors API analyzes **152 million domains** for competitive landscape
    mapping, built on a foundation of **1.6 trillion search results** and **8 billion
    keywords** with comprehensive competitive metrics. Our database provides **20x
    more paid keywords per domain** and **2x more organic keywords per domain** than
    SEMRush or Ahrefs. **Every competitive relationship updates every 15 seconds**,
    ensuring you have real-time competitive intelligence across all 28 supported countries.


    While competitors provide basic competitor lists, SpyFu delivers complete competitive
    timeline analysis with 18 years of historical data and live updates every 15 seconds.
    Our unique cross-channel approach identifies competitors who may challenge you
    in organic search, paid search, or both channels simultaneously.


    With this API, you can identify your top SEO and PPC competitors with overlap
    analysis, discover emerging competitors before they become threats, analyze competitive
    strength across multiple search channels, uncover market opportunities through
    competitor gap analysis, track competitive landscape changes over time, and benchmark
    your market position against key competitors. Access comprehensive competitor
    intelligence to understand who competes for your target keywords and how their
    strategies have evolved over nearly two decades.


    The Competitors API integrates seamlessly with SpyFu''s Ad History, SEO Research,
    and Domain Stats APIs to provide complete competitive intelligence, enabling you
    to analyze competitor strategies across both advertising campaigns and organic
    search performance.


    Get started with comprehensive API documentation and interactive examples at [SpyFu
    Developer Portal](https://developer.spyfu.com).'
servers:
- url: https://api.spyfu.com/apis/competitors_api
paths:
  /v2/ppc/getTopCompetitors:
    get:
      operationId: CompetitorsApi_GetTopPpcCompetitors_GET
      summary: Get Top PPC Competitors
      description: 'Returns the top paid search (PPC) competitors for a domain based
        on shared keyword advertising overlap. This endpoint identifies domains that
        compete for the same paid keywords to reveal direct advertising competition
        and bidding opportunities.


        [Visualize this API live on SpyFu](https://www.spyfu.com/ppc/competitors?query=example.com)'
      parameters:
      - name: domain
        in: query
        description: Domain to analyze for paid search competitors.
        required: true
        schema:
          type: string
          example: example.com
        example: example.com
      - name: countryCode
        in: query
        description: Country market to search.  Specifically, this maps to the Google
          domain version to query against (e.g., google.com for US, google.de for
          Germany, etc.).  <a href='https://developer.spyfu.com/reference/adhistoryapi_getdomainadhistory_get#/'>All
          Countries</a>
        schema:
          type: string
          default: US
          enum:
          - AR
          - AT
          - AU
          - BE
          - BR
          - CA
          - CH
          - DE
          - DK
          - ES
          - FR
          - IE
          - IN
          - IT
          - JP
          - MX
          - NL
          - 'NO'
          - NZ
          - PL
          - PT
          - SE
          - SG
          - TR
          - UA
          - UK
          - US
          - ZA
          example: US
        example: US
      - name: sortBy
        in: query
        description: Column to sort by.
        schema:
          type: string
          default: Rank
          enum:
          - Domain
          - CommonTerms
          - Rank
          example: Rank
        example: Rank
      - name: sortOrder
        in: query
        description: Order to sort results.
        schema:
          type: string
          default: Descending
          enum:
          - Ascending
          - Descending
          example: Descending
        example: Descending
      - name: pageSize
        in: query
        description: The maximum number of rows returned.
        schema:
          type: integer
          format: int32
          default: 5
          maximum: 550
          minimum: 1
          example: 5
        example: 5
      - name: startingRow
        in: query
        description: Row number to start the results with.
        schema:
          type: integer
          format: int32
          default: 1
          maximum: 550
          minimum: 1
          example: 1
        example: 1
      responses:
        '200':
          description: Successfully retrieved PPC competitor data. Returns a paginated
            list of domains competing for shared paid keywords with overlap metrics
            and advertising strength indicators.
          content:
            application/json:
              schema:
                description: Response wrapper containing competitor analysis data
                  for a specific search channel (SEO or PPC) with pagination metadata.
                type: object
                properties:
                  resultCount:
                    description: Number of results returned
                    type: integer
                    format: int32
                    readOnly: true
                    example: 50
                  totalMatchingResults:
                    description: Total number of competitor domains available that
                      match the query criteria, including results not included in
                      the current page.
                    type: integer
                    format: int64
                    readOnly: true
                    example: 2500
                  results:
                    description: Array of competitor domains ranked by keyword overlap
                      strength in the specified search channel.
                    type: array
                    items:
                      type: object
                      properties:
                        domain:
                          description: Domain name of the competitor that shares significant
                            keyword overlap in the specified search channel (SEO or
                            PPC).
                          type: string
                          nullable: true
                          example: example.com
                        commonTerms:
                          description: Number of unique keywords that both this competitor
                            domain and the target domain compete for in the same search
                            channel.
                          type: integer
                          format: int32
                          example: 1432
                        rank:
                          description: The rank is a metric for how much overlap there
                            is between your domain and the competitor
                          type: number
                          format: float
                      additionalProperties: false
                      description: Represents a competitor domain with shared keyword
                        overlap data, indicating the strength of competitive relationship
                        in either paid or organic search.
                    readOnly: true
                    nullable: true
                additionalProperties: false
        '400':
          description: Bad Request - Invalid parameters provided (e.g., invalid domain
            format, pageSize exceeds maximum, or invalid country code)
        '401':
          description: Unauthorized - Invalid API credentials or insufficient permissions
            to access PPC competitor data
        '500':
          description: Internal Server Error - A server-side error occurred while
            processing the request
      tags:
      - Competitors API
