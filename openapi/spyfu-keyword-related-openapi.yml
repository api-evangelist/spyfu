          description: Successfully retrieved keyword information. Returns comprehensive
            metrics including search volume, competition levels, cost estimates, and
            performance data for each requested keyword.
          content:
            application/json:
              schema:
                type: object
                properties:
                  resultCount:
                    description: Number of results returned
                    type: integer
                    format: int32
                    readOnly: true
                    example: 100
                  totalMatchingResults:
                    description: "The total number of results available that matches\
                      \ the query including\r\nitems that might not be included in\
                      \ the returned results/page."
                    type: integer
                    format: int64
                    readOnly: true
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        keyword:
                          description: By looking at strong competitors in this niche
                            and their most trusted keywords over time, we suggest
                            similar keywords here that we found to be profitable for
                            your competition.
                          type: string
                          nullable: true
                          example: red shoes
                        searchVolume:
                          description: This is the estimated number of times this
                            past month that people have searched this keyword. The
                            numbers reflect searches done in the US on Google.com
                            (or in the UK on Google.co.uk if you are looking at UK
                            data). We blend data from multiple sources to give a truer
                            snapshot of activity on this keyword.
                          type: integer
                          format: int64
                          nullable: true
                          example: 266000
                        liveSearchVolume:
                          description: This metric displays a more likely SV based
                            on recent trends or out-of-date estimates. The original
                            volume remains unchanged in any domain's rolled-up metrics.
                          type: integer
                          format: int64
                          nullable: true
                          example: 82000
                        rankingDifficulty:
                          description: We've calculated how difficult it would be
                            to rank on this keyword. The score is based on a scale
                            of 0-100 (with 100 being the most difficult to rank for).
                            Compare this number to other keywords you're targeting
                            to get an idea of how to prioritize your SEO campaign.
                          type: integer
                          format: int32
                          nullable: true
                          example: 98
                        totalMonthlyClicks:
                          description: This is the total number of all clicks (organic
                            and paid) made on the SERP over the past month.
                          type: integer
                          format: int64
                          nullable: true
                          example: 219000
                        percentMobileSearches:
                          description: When we have a breakdown of how many of the
                            searches for this keyword come from mobile vs desktop,
                            we will show it here.
                          type: number
                          format: double
                          nullable: true
                          example: 0.52009505
                        percentDesktopSearches:
                          description: When we have a breakdown of how many of the
                            searches for this keyword come from desktop vs mobile,
                            we will show it here.
                          type: number
                          format: double
                          nullable: true
                          example: 0.47990492
                        percentSearchesNotClicked:
                          description: Some SERPs return enough information that the
                            user does not have to click any results. There might also
                            be unexpected results that cause the user to abandon the
                            SERP without any clicks. This is the rate that searchers
                            leave the page without clicking any result.
                          type: number
                          format: double
                          nullable: true
                          example: 0.1792681
                        percentPaidClicks:
                          description: Of all clicks made to this keyword's SERP,
                            this percentage measures how many went to the paid ads.
                          type: number
                          format: double
                          nullable: true
                          example: 0.52188635
                        percentOrganicClicks:
                          description: Of all clicks made to this keyword's SERP,
                            this percentage measures how many went to organic results.
                          type: number
                          format: double
                          nullable: true
                          example: 0.47811362
                        broadCostPerClick:
                          description: "This is the average amount an advertiser pays\
                            \ Google anytime someone clicks their ad on this keyword.\
                            \ These costs fluctuate depending on many factors, so\
                            \ keep that in mind when you are estimating larger budgets.\r\
                            \n<p>These costs can vary depending on how specific (exact\
                            \ match vs. phrase match vs. broad match) the search is.</p>"
                          type: number
                          format: double
                          nullable: true
                          example: 0.73
                        phraseCostPerClick:
                          description: "This is the average amount an advertiser pays\
                            \ Google anytime someone clicks their ad on this keyword.\
                            \ These costs fluctuate depending on many factors, so\
                            \ keep that in mind when you are estimating larger budgets.\r\
                            \n<p>These costs can vary depending on how specific (exact\
                            \ match vs. phrase match vs. broad match) the search is.</p>"
                          type: number
                          format: double
                          nullable: true
                          example: 0.67
                        exactCostPerClick:
                          description: "This is the average amount an advertiser pays\
                            \ Google anytime someone clicks their ad on this keyword.\
                            \ These costs fluctuate depending on many factors, so\
                            \ keep that in mind when you are estimating larger budgets.\r\
                            \n<p>These costs can vary depending on how specific (exact\
                            \ match vs. phrase match vs. broad match) the search is.</p>"
                          type: number
                          format: double
                          nullable: true
                          example: 0.65
                        broadMonthlyClicks:
                          description: Estimated monthly clicks for broad match advertising
                            on this keyword, calculated from search volume and expected
                            click-through rates.
                          type: number
                          format: float
                          nullable: true
                          example: 57019.8
                        phraseMonthlyClicks:
                          description: Estimated monthly clicks for phrase match advertising
                            on this keyword, calculated from search volume and expected
                            click-through rates.
                          type: number
                          format: float
                          nullable: true
                          example: 42150.3
                        exactMonthlyClicks:
                          description: Estimated monthly clicks for exact match advertising
                            on this keyword, calculated from search volume and expected
                            click-through rates.
                          type: number
                          format: float
                          nullable: true
                          example: 29094.6
                        broadMonthlyCost:
                          description: "Our estimate of what an advertiser would spend,\
                            \ on average, to advertise on this keyword each month.\r\
                            \n<p>These costs can vary depending on how specific (exact\
                            \ match vs. phrase match vs. broad match) the search is.</p>"
                          type: number
                          format: double
                          nullable: true
                          example: 41604.9
                        phraseMonthlyCost:
                          description: "Our estimate of what an advertiser would spend,\
                            \ on average, to advertise on this keyword each month.\r\
                            \n<p>These costs can vary depending on how specific (exact\
                            \ match vs. phrase match vs. broad match) the search is.</p>"
                          type: number
                          format: double
                          nullable: true
                          example: 25542
                        exactMonthlyCost:
                          description: "Our estimate of what an advertiser would spend,\
                            \ on average, to advertise on this keyword each month.\r\
                            \n<p>These costs can vary depending on how specific (exact\
                            \ match vs. phrase match vs. broad match) the search is.</p>"
                          type: number
                          format: double
                          nullable: true
                          example: 19041.6
                        paidCompetitors:
                          description: This is the total number of advertisers we've
                            seen over the last 14 months for this keyword. It's helpful
                            to know how competitive the field is and how many advertisers
                            have tested this keyword over time.
                          type: integer
                          format: int32
                          nullable: true
                          example: 15
                        distinctCompetitors:
