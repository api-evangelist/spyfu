          type: integer
          format: int32
          example: 1
        searchDateId:
          description: Date when this ad was captured by SpyFu's crawling system,
            formatted as YYYYMMDD (e.g., 20231215 = December 15, 2023).
          type: integer
          format: int32
          example: 20231215
        title:
          description: The headline text of the ad as it appeared in search results.
          type: string
          nullable: true
          example: Best Running Shoes 2024 - Free Shipping
        body:
          description: The description text of the ad providing additional details
            about the offer.
          type: string
          nullable: true
          example: Discover premium running shoes with advanced cushioning technology.
            Shop now and save 20% on your first order.
        url:
          description: The landing page URL that the ad directed users to when clicked.
          type: string
          nullable: true
          example: https://example.com/running-shoes
        adId:
          description: Unique identifier for this specific ad in SpyFu's database.
          type: integer
          format: int32
          example: 12345678
      additionalProperties: false
    PublicApiDomainAdHistoryWrapperOutputDto:
      description: Response wrapper containing domain ad history results with pagination
