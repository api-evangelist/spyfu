          recent statistics for each domain (current snapshot). If false, returns
          complete historical data showing trends over time for comprehensive analysis.
        required: true
        schema:
          type: boolean
          default: true
          example: true
        example: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  resultCount:
                    description: Number of results returned
                    type: integer
                    format: int32
                    readOnly: true
                    example: 1
                  totalMatchingResults:
                    description: "The total number of results available that matches\
                      \ the query including\r\nitems that might not be included in\
                      \ the returned results/page."
                    type: integer
                    format: int64
                    readOnly: true
                    nullable: true
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        domain:
                          description: Searched domain
                          type: string
                          nullable: true
