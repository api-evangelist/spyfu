openapi: 3.0.3
info:
  title: Domain Stats API
  version: v2
  description: 'Access comprehensive domain performance metrics and historical analytics
    to track search visibility trends, competitive positioning, and market share evolution
    over time. Powered by SpyFu''s unmatched historical data collection spanning 18
    years of continuous monitoring across both organic and paid search channels.


    SpyFu''s Domain Stats API provides **18 years of complete historical data** for
    every tracked domain, built on a foundation of **1.6 trillion search results**
    and **152 million domains** analyzed for comprehensive performance metrics. Our
    database delivers **20x more paid keywords per domain** and **2x more organic
    keywords per domain** than SEMRush or Ahrefs. **Every domain metric updates every
    15 seconds**, ensuring you have real-time performance intelligence across all
    28 supported countries.


    While competitors provide basic domain snapshots with limited history, SpyFu offers
    complete domain timeline analysis with 18 years of historical data and live updates
    every 15 seconds. Our comprehensive tracking covers both organic and paid search
    performance since 2007, providing unmatched insight into long-term domain evolution.


    With this API, you can track domain performance trends across SEO and PPC channels
    over time, analyze seasonal patterns and growth trajectories, benchmark domain
    performance against historical baselines, identify performance inflection points
    and strategy changes, monitor competitive domain performance evolution, and access
    complete domain visibility metrics spanning nearly two decades. Understand how
    domains have grown their search presence and learn from successful optimization
    strategies implemented over years.


    The Domain Stats API integrates seamlessly with SpyFu''s SEO Research, Ad History,
    and Competitors APIs to provide complete domain intelligence, enabling you to
    correlate performance metrics with specific keyword strategies and competitive
    activities.


    Get started with comprehensive API documentation and interactive examples at [SpyFu
    Developer Portal](https://developer.spyfu.com).'
servers:
- url: https://api.spyfu.com/apis/domain_stats_api
paths:
  /v2/getAllDomainStats:
    get:
      operationId: DomainStatsApi_GetAllDomainStats_GET
      summary: Get All Domain Stats
      description: 'Returns comprehensive domain statistics for all available historical
        periods. This endpoint provides time-series data showing SEO and PPC performance
        trends to analyze domain growth, competitive positioning, and marketing effectiveness
        over time.


        [Visualize this API live on SpyFu](https://www.spyfu.com/domain-overview?query=example.com)'
      parameters:
      - name: domain
        in: query
        description: Domain to retrieve comprehensive statistics for.
        required: true
        schema:
          type: string
          example: example.com
        example: example.com
      - name: countryCode
        in: query
        description: Country market to search.  Specifically, this maps to the Google
          domain version to query against (e.g., google.com for US, google.de for
          Germany, etc.).  <a href='https://developer.spyfu.com/reference/adhistoryapi_getdomainadhistory_get#/'>All
          Countries</a>
        schema:
          type: string
          default: US
          enum:
          - AR
          - AT
          - AU
          - BE
          - BR
          - CA
          - CH
          - DE
          - DK
          - ES
          - FR
          - IE
          - IN
          - IT
          - JP
          - MX
          - NL
          - 'NO'
          - NZ
          - PL
          - PT
          - SE
          - SG
          - TR
          - UA
          - UK
          - US
          - ZA
          example: US
        example: US
      responses:
        '200':
          description: Successfully retrieved comprehensive domain statistics across
            all time periods. Returns historical data showing SEO/PPC trends, keyword
            counts, traffic estimates, and competitive metrics.
          content:
            application/json:
              schema:
                description: Response wrapper containing comprehensive domain performance
                  statistics across multiple time periods with detailed SEO and PPC
                  metrics.
                type: object
                properties:
                  domain:
                    description: Domain name for which the statistics were collected
                      and analyzed.
                    type: string
                    nullable: true
                    example: example.com
                  results:
                    description: Array of domain performance statistics organized
                      by time period, including SEO metrics, PPC data, traffic estimates,
                      and competitive strength indicators.
                    type: array
                    items:
                      type: object
                      properties:
                        searchMonth:
                          description: Month when these domain statistics were collected
                            (1-12).
                          type: integer
                          format: int32
                          example: 5
                        searchYear:
                          description: Year when these domain statistics were collected.
                          type: integer
                          format: int32
                          example: 2021
                        averageOrganicRank:
                          description: Average organic search ranking position across
                            all keywords for this domain during the specified month.
                          type: number
                          format: double
                          example: 41.08
                        monthlyPaidClicks:
                          description: Estimated monthly clicks received from paid
                            search advertising across all keywords, calculated based
                            on average ad positions and click-through rates.
                          type: number
                          format: double
                          example: 61181.88
                        averageAdRank:
                          description: Average paid search ad position across all
                            advertised keywords during the specified month.
                          type: number
                          format: double
                          example: 1.03
                        totalOrganicResults:
                          description: Total number of unique organic keywords where
                            this domain appears in the top 100 search results during
                            the specified month.
                          type: integer
                          format: int32
                          example: 302731
                        monthlyBudget:
                          description: Estimated monthly Google Ads spending based
                            on keyword positions, click-through rates, and cost-per-click
                            data across all paid campaigns.
                          type: number
                          format: double
                          example: 6721.39
                        monthlyOrganicValue:
                          description: Estimated value of organic search traffic based
                            on keyword rankings and equivalent cost-per-click values,
                            representing the advertising spend equivalent of organic
                            visibility.
                          type: number
                          format: double
                          example: 384233.16
                        totalAdsPurchased:
                          description: Total number of unique paid keywords where
                            this domain's ads appeared on the first page of search
                            results, measured over the last 14 data collection periods.
                          type: integer
                          format: int32
                          example: 599
                        monthlyOrganicClicks:
                          description: Estimated monthly organic search traffic clicks
                            received from all ranking keywords during the specified
                            month.
                          type: number
                          format: double
                          example: 290145
                        strength:
                          description: Domain authority score (0-100) indicating competitive
                            strength and ranking consistency across high-value keywords,
                            with higher scores representing stronger market position.
                          type: integer
                          format: int32
                          example: 75
                        totalInverseRank:
                          description: Cumulative ranking score where higher organic
                            positions receive higher point values (position 1 = 100
                            points, position 2 = 99 points, etc.), summed across all
                            ranking keywords.
                          type: integer
                          format: int64
                          example: 4971564
                        areStatsNormalized:
                          description: Indicates whether the statistics have been
                            normalized for consistent comparison across different
                            time periods and data collection methods.
                          type: boolean
                          example: true
                      additionalProperties: false
                      description: Represents comprehensive domain performance statistics
                        for a specific month, including SEO and PPC metrics, traffic
                        estimates, and competitive strength indicators.
                    nullable: true
                  resultCount:
                    description: Number of results returned
                    type: integer
                    format: int32
                    readOnly: true
                    example: 1
                additionalProperties: false
        '400':
          description: Bad Request - Invalid parameters provided (e.g., invalid domain
            format or invalid country code)
        '401':
          description: Unauthorized - Invalid API credentials or insufficient permissions
            to access domain statistics data
        '500':
          description: Internal Server Error - A server-side error occurred while
            processing the request
      tags:
      - Domain Stats API
