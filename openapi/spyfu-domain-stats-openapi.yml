                                type: number
                                format: double
                                example: 61181.88
                              averageAdRank:
                                description: Average paid search ad position across
                                  all advertised keywords during the specified month.
                                type: number
                                format: double
                                example: 1.03
                              totalOrganicResults:
                                description: Total number of unique organic keywords
                                  where this domain appears in the top 100 search
                                  results during the specified month.
                                type: integer
                                format: int32
                                example: 302731
                              monthlyBudget:
                                description: Estimated monthly Google Ads spending
                                  based on keyword positions, click-through rates,
                                  and cost-per-click data across all paid campaigns.
                                type: number
                                format: double
                                example: 6721.39
                              monthlyOrganicValue:
                                description: Estimated value of organic search traffic
                                  based on keyword rankings and equivalent cost-per-click
                                  values, representing the advertising spend equivalent
                                  of organic visibility.
                                type: number
                                format: double
