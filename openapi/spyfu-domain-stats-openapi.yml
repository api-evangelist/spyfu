  /v2/getBulkDomainStats:
    get:
      operationId: DomainStatsApi_GetBulkDomainStats_GET
      summary: Bulk Domain Statistics (Snapshot or History)
      description: Returns SEO and PPC metrics for multiple domains in one request.
        Suitable for batch enrichment, benchmarking, and portfolio monitoring.
      parameters:
      - name: domains
        in: query
        description: Comma-separated list of domains to analyze. Each domain should
          be provided as a root domain (example.com) without protocol or paths. Maximum
          of 1000 domains per request.
        required: true
        schema:
          type: string
          example: example.com,competitor.com,industry-leader.com
        example: example.com,competitor.com,industry-leader.com
      - name: countryCode
        in: query
        description: Country market to analyze. Specifically, this maps to the Google
          domain version to query against (e.g., google.com for US, google.de for
          Germany, etc.).
        schema:
          type: string
          default: US
          enum:
          - AR
          - AT
          - AU
          - BE
          - BR
          - CA
          - CH
          - DE
          - DK
          - ES
          - FR
          - IE
          - IN
          - IT
          - JP
          - MX
          - NL
          - 'NO'
          - NZ
          - PL
          - PT
