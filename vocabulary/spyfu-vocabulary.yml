  type: number
- name: percentDesktopSearches.min
  description: Filter to keywords where the desktop search share (%) is ≥ this value
    (range 0-100).
  type: number
- name: percentMobileSearches.max
  description: Filter to keywords where the mobile search share (%) is ≤ this value
    (range 0-100).
  type: number
- name: percentMobileSearches.min
  description: Filter to keywords where the mobile search share (%) is ≥ this value
    (range 0-100).
  type: number
- name: percentNotClicked.max
  description: Filter to keywords where the percentage of searches with no click is
