    additional words allowed).
  type: string
- name: countryCode
  description: Country market to search.  Specifically, this maps to the Google domain
    version to query against (e.g., google.com for US, google.de for Germany, etc.).  <a
    href='https://developer.spyfu.com/reference
  type: string
- name: day
  description: 'Field: day'
  type: string
- name: desktopSearchesPercentage.max
  description: Filter by the percentage of searches that are done on desktop devices.
  type: number
- name: desktopSearchesPercentage.min
  description: Filter by the percentage of searches that are done on desktop devices.
  type: number
- name: domain
  description: Advertiser's root domain
  type: string
- name: domains
  description: Array of domains (advertisers) that have purchased ads for the specified
    keyword, ranked by performance metrics.
  type: string
- name: endDate
  description: Ending date for range
  type: string
- name: endRank.max
  description: Filter to keywords where the domain/URL ending rank position is ≤ this
    value for the selected date range (1 = best/top organic result).
  type: number
- name: endRank.min
  description: Filter to keywords where the domain/URL ending rank position is ≥ this
    value for the selected date range (1 = best/top organic result).
  type: number
- name: endRankChange.max
  description: Filter to keywords where the rank change was at most this many positions
    between the start and end of the date range (end_rank_change ≤ value). Positive
    values mean moved up; negative values mean move
  type: number
- name: endRankChange.min
  description: Filter to keywords where the rank improved by at least this many positions
    between the start and end of the date range (end_rank_change ≥ value). Positive
    values mean moved up; negative values mean mo
  type: number
- name: exactMatch
  description: "Indicates whether to apply exact match filtering for the query.\r\n\
    This parameter will result in **only** exact matches,\r\nmeaning protocols (http/https)\
    \ and trailing slashes **must** be included.\r\nFor e"
  type: boolean
- name: excludeDomain
  description: Domain to exclude from keyword results.
  type: string
- name: excludeDomainsCsv
  description: CSV list of domains to exclude in results
  type: string
- name: excludeHomepageKeywords
  description: If true, exclude keywords where the domain/URL's homepage (root domain,
    e.g., example.com) ranks; if false, include all.
  type: boolean
- name: excludeTerms
  description: Comma-separated list of terms to exclude from results (e.g., branded
    or irrelevant terms).
  type: string
- name: finalCost
  description: 'Field: finalCost'
  type: number
- name: includeAnyTerm
  description: 'Used with includeTerms. If true: match any term (OR). If false: require
    all terms (AND).'
  type: boolean
- name: includeDomainsCsv
  description: Comma-separated list of domains to include in keyword analysis.
  type: string
- name: includeTerms
  description: Comma-separated list of terms that must be present in the keyword.
  type: string
- name: isIntersection
  description: Keywords (True:ALL/False:ANY) the domains contain.
  type: boolean
- name: isPaid
  description: 'Field: isPaid'
  type: boolean
- name: isQuestion
  description: Filter on if the keyword is a question.
  type: boolean
- name: isTransactionalIntent
  description: Filter on if the keyword has transactional intent.
  type: boolean
- name: keyword
  description: Keyword to analyze for SERP ranking data.
  type: string
- name: keywordDifficulty.max
  description: Filter to keywords where the keyword difficulty score is ≤ this value
