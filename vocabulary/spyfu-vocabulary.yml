  type: number
- name: keywordDifficulty.min
  description: Filter to keywords where the keyword difficulty score is ≥ this value
    (0-100; higher = harder to rank).
  type: number
- name: keywordFilter
  description: Filter down to keywords containing this value
  type: string
- name: keywordSearchType
  description: 'Required. Selects keyword research method: PhraseMatch=thematically
    related, Questions=interrogative forms, AlsoBuysAdsFor=keywords co-targeted in
    ads, AlsoRanksFor=keywords co-ranking organically, Tr'
  type: string
- name: keywords
  description: Comma-separated list of exact keywords to retrieve information for.
  type: string
- name: liveSearchVolume.max
  description: Filter by the number of searches done this past month on Google. This
    value is refreshed each month.
  type: number
- name: liveSearchVolume.min
  description: Filter by the number of searches done this past month on Google. This
    value is refreshed each month.
  type: number
- name: mobileSearchesPercentage.max
  description: Filter by the percentage of searches that are done on mobile devices.
  type: number
- name: mobileSearchesPercentage.min
  description: Filter by the percentage of searches that are done on mobile devices.
  type: number
- name: month
  description: 'Field: month'
  type: string
- name: monthlyBudget.max
  description: Maximum monthly ad budget filter.
  type: number
- name: monthlyBudget.min
  description: Minimum monthly ad budget filter.
  type: number
- name: monthlyCost.max
  description: Filter to keywords where the estimated monthly advertising cost is
