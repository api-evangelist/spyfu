  description: Number of results returned
  type: integer
- name: results
  description: Array of ads with their associated keywords found for the specified
    domain.
  type: string
- name: rowsReturned
  description: 'Field: rowsReturned'
  type: integer
- name: searchType
  description: Type of SEO keyword analysis to perform. Each type provides different
    insights into keyword performance and ranking changes.
  type: string
- name: searchVolume.max
  description: Filter to keywords where monthly search volume (Google) is ≤ this value.
  type: number
- name: searchVolume.min
  description: Filter to keywords where monthly search volume (Google) is ≥ this value.
  type: number
- name: seoClicks.max
  description: Filter to keywords where estimated monthly organic clicks (SEO clicks)
