  type: number
- name: percentPaidClicks.min
  description: Filter to keywords where the share of SERP clicks going to paid ads
    (%) is ≥ this value (range 0-100).
  type: number
- name: ppcCompetitors
  description: Array of competitor domains ranked by paid search advertising keyword
    overlap and competitive strength.
  type: string
- name: query
  description: Domain to analyze for paid search presence.
  type: string
- name: queryType
  description: Type of ranking analysis to perform.
  type: string
- name: rank.max
  description: Filter to keywords where the domain/URL rank position is ≤ this value
    (1 = best/top organic result).
  type: number
- name: rank.min
  description: Filter to keywords where the domain/URL rank position is ≥ this value
    (1 = best/top organic result).
  type: number
- name: rankAverage
  description: 'Field: rankAverage'
  type: number
- name: rankAverageChange
  description: 'Field: rankAverageChange'
  type: number
- name: rankChange.max
  description: Filter to keywords where the month-over-month rank change is at most
