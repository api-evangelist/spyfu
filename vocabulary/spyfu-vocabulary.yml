  type: string
- name: compareDomain
  description: Domain to compare against when evaluating where it outranks you and
    where you outrank it.
  type: string
- name: costPerClick.max
  description: Filter to keywords where the average cost per click (CPC) is ≤ this
    value.
  type: number
- name: costPerClick.min
  description: Filter to keywords where the average cost per click (CPC) is ≥ this
    value.
  type: number
- name: costPerClickOption
  description: Match type for CPC filtering. Broad = includes variations/related terms;
