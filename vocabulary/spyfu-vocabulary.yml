  type: number
- name: monthlyOrganicClicks.max
  description: Maximum monthly organic traffic filter.
  type: number
- name: monthlyOrganicClicks.min
  description: Minimum monthly organic traffic filter.
  type: number
- name: monthlyOrganicValue.max
  description: Maximum organic traffic value filter.
  type: number
- name: monthlyOrganicValue.min
  description: Minimum organic traffic value filter.
  type: number
- name: monthlyPaidClicks.max
  description: Maximum monthly paid clicks filter.
  type: number
- name: monthlyPaidClicks.min
  description: Minimum monthly paid clicks filter.
  type: number
- name: notClickedSearchesPercentage.max
  description: 'Filter by the percentage of searches that are not clicked.

    Some keyword searches supply clear information in a featured snippet or similar
    displays. They don''t require a click to get the information. '
  type: number
- name: notClickedSearchesPercentage.min
  description: 'Filter by the percentage of searches that are not clicked.

    Some keyword searches supply clear information in a featured snippet or similar
    displays. They don''t require a click to get the information. '
  type: number
- name: onlyAdultKeywords
  description: Only include adult keywords considered unsafe for work.
  type: boolean
- name: organicClicksSearchPercentage.max
  description: Filter by the percentage of clicks that go to organic results, not
