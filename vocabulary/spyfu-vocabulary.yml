name: SpyFu API Vocabulary
description: Vocabulary of terms used across SpyFu competitive intelligence APIs including
  SEO, PPC, keyword research, and domain analytics.
url: https://developer.spyfu.com/
version: v2
terms:
- name: adCount.max
  description: Filter to keywords where the number of distinct advertisers observed
    over the last 14 months is ≤ this value.
  type: number
- name: adCount.min
  description: Filter to keywords where the number of distinct advertisers observed
    over the last 14 months is ≥ this value.
  type: number
- name: adultFilter
  description: Exclude adult keywords considered unsafe for work.
  type: boolean
- name: apiMethod
  description: 'Field: apiMethod'
  type: string
- name: averageAdRank.max
  description: Maximum average ad position filter.
  type: number
- name: averageAdRank.min
  description: Minimum average ad position filter.
  type: number
- name: averageOrganicRank.max
  description: Maximum average organic rank filter.
  type: number
- name: averageOrganicRank.min
  description: Minimum average organic rank filter.
  type: number
- name: baseUnits
  description: 'Field: baseUnits'
  type: integer
- name: clicks.max
  description: Filter by the number of total monthly clicks on the SERP for this keyword--organic
    and paid.
  type: number
- name: clicks.min
  description: Filter by the number of total monthly clicks on the SERP for this keyword--organic
    and paid.
  type: number
- name: combinedCompetitors
  description: Array of competitor domains ranked by combined SEO and PPC keyword
