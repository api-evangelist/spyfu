  type: number
- name: pageSize
  description: Number of ad history records to return per page.
  type: integer
- name: paidClickSearchPercentage.max
  description: Filter by the percentage of clicks that go to ads.
  type: number
- name: paidClickSearchPercentage.min
  description: Filter by the percentage of clicks that go to ads.
  type: number
- name: paidCompetitors.max
  description: Filter to keywords where the number of distinct advertisers observed
    over the last 14 months is ≤ this value.
  type: number
- name: paidCompetitors.min
  description: Filter to keywords where the number of distinct advertisers observed
    over the last 14 months is ≥ this value.
  type: number
- name: pastNMonths
  description: Returns the latest N months of stats for domain.
  type: integer
- name: percentDesktopSearches.max
  description: Filter to keywords where the desktop search share (%) is ≤ this value
